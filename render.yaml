services:
  - type: web
    name: factflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_cloud:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: FLASK_SECRET_KEY
        value: factflow-classified-2026
